spring:
  application:
    name: finvibe-backend-batch
  main:
    allow-bean-definition-overriding: true
    web-application-type: none
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: local
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  jpa:
    open-in-view: false
  batch:
    job:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:local}
    distribution:
      percentiles-histogram:
        http.server.requests: true

batch:
  chunk:
    portfolio-snapshot-size: 500
    user-ranking-snapshot-size: 500

resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.RestClientException
    instances:
      kisStockSearch:
        baseConfig: default
      kisChartData:
        baseConfig: default
      kisRealtimePrice:
        baseConfig: default

market:
  kis:
    base-url: ${KIS_BASE_URL:https://openapi.koreainvestment.com:9443}
    user-id: ${KIS_USER_ID:}
    credentials:
      - app-key: ${KIS_API_KEY_1:${KIS_API_KEY:}}
        app-secret: ${KIS_API_SECRET_1:${KIS_API_SECRET:}}
      - app-key: ${KIS_API_KEY_2:}
        app-secret: ${KIS_API_SECRET_2:}
    websocket:
      url: ${KIS_WEBSOCKET_URL:ws://ops.koreainvestment.com:21000}

langchain4j:
  google-ai-gemini:
    chat-model:
      api-key: ${GEMINI_API_KEY}
      model-name: ${GEMINI_MODEL_NAME:gemini-2.5-flash}
      high-model-name: ${GEMINI_HIGH_MODEL_NAME:gemini-2.5-flash}
